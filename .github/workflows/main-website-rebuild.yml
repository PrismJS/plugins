name: Rebuild Main Website
on:
  push:
    branches:
      - main

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify Build Hook
        run: curl -X POST -d "{}" "https://api.netlify.com/build_hooks/67ee8bcdb6033e6afa7eec48?trigger_title=The+plugins+repo+has+been+updated"
